name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

permissions:
  contents: read

jobs:
  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v17

  test:
    name: Python
    uses: tskit-dev/.github/.github/workflows/python-tests.yml@v17
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python }}
      coverage-directory: sc2ts
    # The trusted first-party tskit-dev/python-tests reusable workflow reads
    # secrets.CODECOV_TOKEN directly without declaring it in its workflow_call
    # interface, so an explicit secrets map would error; inherit is required.
    secrets: inherit  # zizmor: ignore[secrets-inherit]
    strategy:
      matrix:
        python: [3.11, 3.13]
        os: [macos-latest, ubuntu-24.04]
